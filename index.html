<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Pralog</title>

<style>
* {
    margin: 0;
    padding: 0;
    font-family: Arial;
    box-sizing: border-box;
}

body {
    display: flex;
    background: #eef1f5;
}

/* MENU */
.sidebar {
    width: 220px;
    height: 100vh;
    background: #1f2d3d;
    color: white;
    padding: 20px;
}

.sidebar h2 {
    margin-bottom: 30px;
}

.menu {
    margin-top: 20px;
}

.menu div {
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 10px;
    transition: 0.3s;
}

.menu div:hover {
    background: #3c4b5c;
}

/* MAIN */
.main {
    flex: 1;
    padding: 30px;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 30px;
}

.title {
    font-size: 24px;
}

/* DASHBOARD */
.dashboard {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
}

.box {
    flex: 1;
    padding: 20px;
    background: white;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.number {
    font-size: 28px;
    font-weight: bold;
}

/* CARDS */
.cards {
    display: flex;
    gap: 20px;
}

.card {
    flex: 1;
    padding: 25px;
    background: white;
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    background: #f0f0f0;
}

/* LOADING */
.loading {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    color: white;
    font-size: 22px;
    justify-content: center;
    align-items: center;
}

/* FOOTER */
.footer {
    margin-top: 50px;
    text-align: center;
    font-size: 12px;
    color: #777;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="sidebar">
    <h2>📦 Pralog</h2>

    <div class="menu">
        <div onclick="abrir('home')">🏠 Home</div>
        <div onclick="abrir('mantran')">📄 MANTRAN</div>
        <div onclick="abrir('emiteai')">🤖 EMITE AI</div>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <div class="header">
        <div class="title">Dashboard</div>
        <div>👤 Usuário</div>
    </div>

    <!-- DASHBOARD -->
    <div class="dashboard">
        <div class="box">
            <div class="number" id="acessos">0</div>
            <div>Acessos</div>
        </div>

        <div class="box">
            <div class="number">2</div>
            <div>Sistemas</div>
        </div>

        <div class="box">
            <div class="number">Ativo</div>
            <div>Status</div>
        </div>
    </div>

    <!-- CARDS -->
    <div class="cards">

        <div class="card" onclick="abrirSistema('mantran')">
            <h2>📄 MANTRAN</h2>
            <p>Renomeador CT-e/MDF-e</p>
        </div>

        <div class="card" onclick="abrirSistema('emiteai')">
            <h2>🤖 EMITE AI</h2>
            <p>Versão Profarma</p>
        </div>

    </div>

    <div class="footer">
        Sistema interno - Grupo Pralog
    </div>

</div>

<!-- LOADING -->
<div class="loading" id="loading">
    Carregando sistema...
</div>

<script>

// LINKS
const links = {
    mantran: "https://anthonygrupopralog-eng.github.io/renomeador-cte/",
    emiteai: "https://anthonygrupopralog-eng.github.io/renomeador-cte---EMITEAI-PROFARMA/"
};

// CONTADOR DE ACESSOS
let acessos = localStorage.getItem("acessos") || 0;
acessos++;
localStorage.setItem("acessos", acessos);
document.getElementById("acessos").innerText = acessos;

// ABRIR SISTEMA COM LOADING
function abrirSistema(tipo) {

    document.getElementById("loading").style.display = "flex";

    setTimeout(() => {
        window.open(links[tipo], "_blank");
        document.getElementById("loading").style.display = "none";
    }, 800);
}

// MENU
function abrir(tipo){
    if(tipo === "home") return;
    abrirSistema(tipo);
}

</script>

</body>
</html>
