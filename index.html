<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Pralog</title>

<style>
* {
    margin: 0;
    padding: 0;
    font-family: Arial;
    box-sizing: border-box;
}

body {
    display: flex;
    background: #eef1f5;
}

/* MENU */
.sidebar {
    width: 230px;
    height: 100vh;
    background: #1f2d3d;
    color: white;
    padding: 20px;
}

.sidebar h2 {
    margin-bottom: 30px;
}

.menu div {
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 10px;
    transition: 0.3s;
}

.menu div:hover {
    background: #3c4b5c;
}

/* MAIN */
.main {
    flex: 1;
    padding: 30px;
}

/* HEADER */
.header {
    font-size: 24px;
    margin-bottom: 30px;
}

/* DASHBOARD */
.dashboard {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
}

.box {
    flex: 1;
    padding: 20px;
    background: white;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.number {
    font-size: 28px;
    font-weight: bold;
}

/* CARDS */
.cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

.card {
    width: 260px;
    padding: 25px;
    background: white;
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.card:hover {
    transform: translateY(-5px);
    background: #f0f0f0;
}

/* LOADING */
.loading {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    color: white;
    font-size: 22px;
    justify-content: center;
    align-items: center;
}

.footer {
    margin-top: 40px;
    font-size: 12px;
    color: #777;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="sidebar">
    <h2>📦 Pralog</h2>

    <div class="menu">
        <div onclick="abrirSistema('mantran')">📄 MANTRAN</div>
        <div onclick="abrirSistema('emiteai')">🤖 EMITE AI</div>
        <div onclick="abrirSistema('extrator')">🧾 Extrator NF-e</div>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <div class="header">Dashboard</div>

    <div class="dashboard">
        <div class="box">
            <div class="number" id="acessos">0</div>
            <div>Acessos</div>
        </div>

        <div class="box">
            <div class="number">3</div>
            <div>Sistemas</div>
        </div>

        <div class="box">
            <div class="number">Online</div>
            <div>Status</div>
        </div>
    </div>

    <!-- CARDS -->
    <div class="cards">

        <div class="card" onclick="abrirSistema('mantran')">
            <h3>📄 MANTRAN</h3>
            <p>CT-e / MDF-e padrão</p>
        </div>

        <div class="card" onclick="abrirSistema('emiteai')">
            <h3>🤖 EMITE AI</h3>
            <p>Versão Profarma</p>
        </div>

        <div class="card" onclick="abrirSistema('extrator')">
            <h3>🧾 Extrator NF-e</h3>
            <p>Ambev</p>
        </div>

    </div>

    <div class="footer">
        Sistema Pralog - Anthony
    </div>

</div>

<div class="loading" id="loading">
    Carregando sistema...
</div>

<script>

// ✅ TODOS OS LINKS
const links = {
    mantran: "https://anthonygrupopralog-eng.github.io/renomeador-cte/",
    emiteai: "https://anthonygrupopralog-eng.github.io/renomeador-cte---EMITEAI-PROFARMA/",
    extrator: "https://anthonygrupopralog-eng.github.io/Extrator-NF-e---Feito-por-Anthony/"
};

// ✅ CONTADOR
let acessos = localStorage.getItem("acessos") || 0;
acessos++;
localStorage.setItem("acessos", acessos);
document.getElementById("acessos").innerText = acessos;

// ✅ ABRIR COM LOADING
function abrirSistema(tipo) {

    const loading = document.getElementById("loading");

    loading.style.display = "flex";

    setTimeout(() => {
        window.open(links[tipo], "_blank");
        loading.style.display = "none";
    }, 600);
}

</script>

</body>
</html>
